<?xml version="1.0" encoding="UTF-8"?>
<!-- CYBER SAMURAI — Print-ready SVG
     Artboard: 4500 × 5400 px (portrait, chest+back panel)
     Usage: DTG front chest print, 14×17 inch placement
     Colors: #FF3346 Oni Red, #00F5FF Cyan, White, near-black -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 4500 5400" width="4500" height="5400">
  <defs>
    <style>
      .r { fill: #FF3346; }
      .c { fill: #00F5FF; }
      .w { fill: #FFFFFF; }
      .k { fill: #0D0D0D; }
      .sr { stroke: #FF3346; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sc { stroke: #00F5FF; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sw { stroke: #FFFFFF; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <filter id="glitch">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <g transform="translate(2250,2700)">

    <!-- ══ Samurai helmet (kabuto) silhouette ══ -->
    <!-- Main helmet dome -->
    <path d="
      M 0,-1600
      C 300,-1600 600,-1520 760,-1360
      C 920,-1200 940,-980 900,-800
      C 860,-620 780,-500 720,-400
      L 600,-200 L -600,-200
      L -720,-400 C -780,-500 -860,-620 -900,-800
      C -940,-980 -920,-1200 -760,-1360
      C -600,-1520 -300,-1600 0,-1600Z
    " class="k"/>

    <!-- Helmet dome outline — keeps silhouette readable on dark garments -->
    <path d="
      M 0,-1600
      C 300,-1600 600,-1520 760,-1360
      C 920,-1200 940,-980 900,-800
      C 860,-620 780,-500 720,-400
      L 600,-200 L -600,-200
      L -720,-400 C -780,-500 -860,-620 -900,-800
      C -940,-980 -920,-1200 -760,-1360
      C -600,-1520 -300,-1600 0,-1600Z
    " class="sw" stroke-width="14" opacity="0.55"/>

    <!-- Helmet highlight gradient line -->
    <path d="M -640,-1300 C -400,-1480 400,-1480 640,-1300"
          class="sc" stroke-width="20" opacity="0.8"/>
    <path d="M -580,-1180 C -360,-1360 360,-1360 580,-1180"
          class="sc" stroke-width="10" opacity="0.4"/>

    <!-- Kabuto maedate (crest) — oni horns, oversized for silhouette -->
    <path d="M -120,-1580 L -320,-2180 C -360,-2300 -220,-2360 -120,-2270 L -10,-1760 Z" class="r"/>
    <path d="M 120,-1580 L 320,-2180 C 360,-2300 220,-2360 120,-2270 L 10,-1760 Z" class="r"/>
    <!-- Horn edge glints -->
    <path d="M -300,-2160 L -140,-1700" class="sc" stroke-width="10" opacity="0.6"/>
    <path d="M 300,-2160 L 140,-1700" class="sc" stroke-width="10" opacity="0.6"/>
    <!-- Crest disc + kanji mark -->
    <circle cx="0" cy="-1480" r="120" fill="#FF3346" opacity="0.9"/>
    <circle cx="0" cy="-1480" r="120" class="sw" stroke-width="10" opacity="0.7"/>
    <text x="0" y="-1430" text-anchor="middle" font-family="serif" font-size="150"
          fill="#FFFFFF" opacity="0.95">鬼</text>

    <!-- Fukikaeshi (side flaps) -->
    <path d="M -900,-800 L -1100,-700 L -1080,-480 L -860,-520 Z" class="k"/>
    <path d="M 900,-800 L 1100,-700 L 1080,-480 L 860,-520 Z" class="k"/>
    <!-- Flap detail -->
    <path d="M -1080,-680 L -920,-720" class="sc" stroke-width="8"/>
    <path d="M -1060,-600 L -900,-640" class="sc" stroke-width="6"/>
    <path d="M 1080,-680 L 920,-720" class="sc" stroke-width="8"/>
    <path d="M 1060,-600 L 900,-640" class="sc" stroke-width="6"/>

    <!-- Visor / menpō (face guard) with circuit motifs -->
    <rect x="-700" y="-200" width="1400" height="600" rx="40" class="k" opacity="0.95"/>
    <!-- Visor scan line glitch effect -->
    <rect x="-700" y="-160" width="1400" height="20" fill="#00F5FF" opacity="0.08"/>
    <rect x="-700" y="-80" width="1400" height="14" fill="#00F5FF" opacity="0.05"/>
    <rect x="-700" y="20" width="1400" height="18" fill="#FF3346" opacity="0.06"/>
    <rect x="-700" y="120" width="1400" height="12" fill="#00F5FF" opacity="0.05"/>

    <!-- Visor eye slit (glowing) -->
    <rect x="-600" y="-100" width="1200" height="120" rx="8" fill="#00F5FF" opacity="0.12"/>
    <rect x="-560" y="-88" width="1120" height="96" rx="6" fill="#00F5FF" opacity="0.2"/>
    <!-- Eye glow core -->
    <rect x="-520" y="-76" width="1040" height="72" rx="4" fill="#00F5FF" opacity="0.7"/>
    <!-- Pupil area -->
    <rect x="-380" y="-64" width="760" height="48" rx="4" class="k"/>
    <!-- Pupil sub-glow -->
    <rect x="-200" y="-60" width="400" height="40" rx="3" fill="#FF3346" opacity="0.5"/>

    <!-- Breathing grille (lower visor) -->
    <line x1="-560" y1="60"  x2="560" y2="60"  class="sw" stroke-width="10" opacity="0.3"/>
    <line x1="-560" y1="110" x2="560" y2="110" class="sw" stroke-width="10" opacity="0.3"/>
    <line x1="-560" y1="160" x2="560" y2="160" class="sw" stroke-width="10" opacity="0.3"/>
    <line x1="-560" y1="210" x2="560" y2="210" class="sw" stroke-width="10" opacity="0.3"/>
    <!-- Vertical grille dividers -->
    <line x1="-280" y1="40" x2="-280" y2="380" class="sw" stroke-width="6" opacity="0.2"/>
    <line x1="280" y1="40" x2="280" y2="380" class="sw" stroke-width="6" opacity="0.2"/>

    <!-- ══ Chest armour (dō) ══ -->
    <path d="M -800,400 L -900,1400 L 900,1400 L 800,400 Z" class="k" opacity="0.9"/>
    <!-- Armour plates -->
    <path d="M -760,440 L -840,880 L 840,880 L 760,440 Z" fill="#1A1A1A" opacity="0.8"/>
    <path d="M -800,920 L -860,1360 L 860,1360 L 800,920 Z" fill="#111111" opacity="0.8"/>
    <!-- Armour rivets / circuit lines -->
    <line x1="-740" y1="460" x2="740" y2="460" class="sc" stroke-width="6" opacity="0.4"/>
    <line x1="-780" y1="900" x2="780" y2="900" class="sc" stroke-width="6" opacity="0.4"/>
    <!-- Chest emblem area (oni mask medallion) -->
    <circle cx="0" cy="660" r="180" fill="#FF3346" opacity="0.12"/>
    <circle cx="0" cy="660" r="160" class="sr" stroke-width="6"/>
    <text x="0" y="700" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-size="100"
          fill="#FF3346" font-weight="900" opacity="0.9">鬼</text>

    <!-- ══ Shoulder pauldrons ══ -->
    <path d="M -900,200 L -1200,300 L -1260,700 L -900,660 Z" class="k"/>
    <path d="M 900,200 L 1200,300 L 1260,700 L 900,660 Z" class="k"/>
    <!-- Pauldron highlight -->
    <path d="M -900,220 L -1180,320 L -1200,500" class="sc" stroke-width="8" opacity="0.4"/>
    <path d="M 900,220 L 1180,320 L 1200,500" class="sc" stroke-width="8" opacity="0.4"/>

    <!-- ══ Katana (drawn across shoulder, bold) ══ -->
    <!-- Blade — wide, with distinct edge bevel -->
    <path d="M 960,200 L 1740,-1080 L 1850,-1010 L 1080,280 Z" class="w" opacity="0.95"/>
    <!-- Hamon temper line along the blade -->
    <path d="M 1010,210 C 1230,-160 1450,-560 1700,-1020" class="sc" stroke-width="14" opacity="0.7"/>
    <!-- Blade tip glint -->
    <path d="M 1740,-1080 L 1900,-1180 L 1850,-1010 Z" class="c" opacity="0.8"/>
    <!-- Tsuba (guard) -->
    <ellipse cx="1010" cy="240" rx="95" ry="60" transform="rotate(-55,1010,240)" fill="#FF3346"/>
    <ellipse cx="1010" cy="240" rx="95" ry="60" transform="rotate(-55,1010,240)" class="sw" stroke-width="8" opacity="0.6"/>
    <!-- Handle with wrap pattern -->
    <path d="M 950,290 L 760,640 L 850,700 L 1050,330 Z" fill="#1A1A1A"/>
    <path d="M 950,290 L 760,640 L 850,700 L 1050,330 Z" class="sr" stroke-width="8" opacity="0.7"/>
    <line x1="920" y1="380" x2="1000" y2="420" class="sr" stroke-width="10" opacity="0.8"/>
    <line x1="870" y1="470" x2="950" y2="510" class="sr" stroke-width="10" opacity="0.8"/>
    <line x1="820" y1="560" x2="900" y2="600" class="sr" stroke-width="10" opacity="0.8"/>

    <!-- ══ Brand text block ══ -->
    <text x="0" y="1700" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-weight="900" font-size="200"
          fill="#FFFFFF" letter-spacing="20" opacity="0.95">CYBER</text>
    <text x="0" y="1900" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-weight="900" font-size="200"
          fill="#FF3346" letter-spacing="20" opacity="0.95">SAMURAI</text>

    <!-- Underline rule -->
    <line x1="-800" y1="1940" x2="800" y2="1940" class="sc" stroke-width="6"/>
    <text x="0" y="2040" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-size="80"
          fill="#00F5FF" letter-spacing="30" opacity="0.7">ONI THEORY   鬼の理論</text>

    <!-- ══ Corner tech frames ══ -->
    <path d="M -1200,-2100 L -1000,-2100 L -1000,-1980" class="sc" stroke-width="10" opacity="0.4"/>
    <path d="M 1200,-2100 L 1000,-2100 L 1000,-1980" class="sc" stroke-width="10" opacity="0.4"/>
    <path d="M -1200,2100 L -1000,2100 L -1000,1980" class="sr" stroke-width="10" opacity="0.4"/>
    <path d="M 1200,2100 L 1000,2100 L 1000,1980" class="sr" stroke-width="10" opacity="0.4"/>

  </g>
</svg>
