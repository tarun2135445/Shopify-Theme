<?xml version="1.0" encoding="UTF-8"?>
<!-- DRAGON SPIRIT — Print-ready SVG
     Artboard: 4500 × 5400 px
     Usage: Full back print or oversized front print
     Colors: #FF3346 Red, #BF5FFF Purple, #00F5FF Cyan, White -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 4500 5400" width="4500" height="5400">
  <defs>
    <style>
      .r  { fill: #FF3346; }
      .p  { fill: #BF5FFF; }
      .c  { fill: #00F5FF; }
      .w  { fill: #FFFFFF; }
      .sr { stroke: #FF3346; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sp { stroke: #BF5FFF; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sc { stroke: #00F5FF; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sw { stroke: #FFFFFF; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <g transform="translate(2250,2700)">

    <!-- ══ Dragon body — coiling from bottom-left to top-right ══ -->

    <!-- Tail section (bottom) -->
    <path d="
      M -800,1800
      C -700,1700 -600,1600 -500,1500
      C -400,1400 -380,1300 -340,1200
      C -300,1100 -240,1000 -200,920
    " class="sr" stroke-width="80"/>
    <path d="
      M -800,1800
      C -700,1700 -600,1600 -500,1500
      C -400,1400 -380,1300 -340,1200
      C -300,1100 -240,1000 -200,920
    " stroke="#BF5FFF" fill="none" stroke-width="56" stroke-linecap="round"/>

    <!-- Body main coil — first loop -->
    <path d="
      M -200,920
      C -100,800 100,720 300,680
      C 500,640 700,660 840,740
      C 980,820 1060,960 1020,1100
      C 980,1240 860,1340 720,1380
      C 580,1420 440,1400 340,1340
      C 240,1280 200,1200 160,1100
      C 120,1000 80,880 0,800
    " class="sr" stroke-width="100"/>
    <path d="
      M -200,920
      C -100,800 100,720 300,680
      C 500,640 700,660 840,740
      C 980,820 1060,960 1020,1100
      C 980,1240 860,1340 720,1380
      C 580,1420 440,1400 340,1340
      C 240,1280 200,1200 160,1100
      C 120,1000 80,880 0,800
    " stroke="#BF5FFF" fill="none" stroke-width="72" stroke-linecap="round"/>

    <!-- Body — second coil -->
    <path d="
      M 0,800
      C -120,700 -300,640 -460,600
      C -620,560 -780,560 -880,640
      C -980,720 -980,860 -920,960
      C -860,1060 -760,1100 -640,1080
    " class="sr" stroke-width="90"/>
    <path d="
      M 0,800
      C -120,700 -300,640 -460,600
      C -620,560 -780,560 -880,640
      C -980,720 -980,860 -920,960
      C -860,1060 -760,1100 -640,1080
    " stroke="#BF5FFF" fill="none" stroke-width="64" stroke-linecap="round"/>

    <!-- Body — rising section -->
    <path d="
      M -640,1080
      C -500,1040 -360,960 -240,860
      C -120,760 -20,640 80,500
      C 180,360 260,200 280,40
      C 300,-120 260,-280 180,-400
    " class="sr" stroke-width="110"/>
    <path d="
      M -640,1080
      C -500,1040 -360,960 -240,860
      C -120,760 -20,640 80,500
      C 180,360 260,200 280,40
      C 300,-120 260,-280 180,-400
    " stroke="#BF5FFF" fill="none" stroke-width="80" stroke-linecap="round"/>

    <!-- Neck -->
    <path d="
      M 180,-400
      C 100,-560 -20,-700 -80,-820
      C -140,-940 -120,-1060 -40,-1140
    " class="sr" stroke-width="120"/>
    <path d="
      M 180,-400
      C 100,-560 -20,-700 -80,-820
      C -140,-940 -120,-1060 -40,-1140
    " stroke="#BF5FFF" fill="none" stroke-width="88" stroke-linecap="round"/>

    <!-- ══ Dragon head ══ -->
    <!-- Head base shape -->
    <path d="
      M -40,-1140
      C 60,-1180 200,-1200 320,-1160
      C 440,-1120 540,-1040 600,-940
      C 660,-840 660,-720 600,-640
      C 540,-560 440,-520 340,-520
      L 200,-480 L -80,-500
      C -200,-520 -300,-580 -340,-680
      C -380,-780 -320,-920 -200,-1020
      C -120,-1080 -40,-1140 -40,-1140Z
    " class="r"/>
    <!-- Head depth -->
    <path d="
      M -20,-1120
      C 80,-1160 200,-1180 300,-1140
      C 400,-1100 480,-1020 520,-920
      C 560,-820 540,-700 480,-620
    " fill="#AA1020"/>

    <!-- Snout / muzzle -->
    <path d="M 200,-480 L 480,-340 L 540,-440 L 320,-540Z" class="r"/>
    <path d="M 480,-340 L 600,-260 L 580,-380 L 540,-440Z" fill="#CC2030"/>

    <!-- Dragon eye (left side visible) -->
    <ellipse cx="160" cy="-860" rx="90" ry="70" fill="#0A0A0A"/>
    <ellipse cx="160" cy="-860" rx="82" ry="62" class="sc" stroke-width="6"/>
    <ellipse cx="160" cy="-860" rx="48" ry="48" fill="#00F5FF" opacity="0.9"/>
    <ellipse cx="160" cy="-860" rx="16" ry="38" fill="#0A0A0A"/>
    <ellipse cx="174" cy="-878" rx="14" ry="10" class="w" opacity="0.9"/>

    <!-- Nostril -->
    <ellipse cx="400" cy="-420" rx="30" ry="18" transform="rotate(-20,400,-420)" fill="#0A0A0A" opacity="0.8"/>

    <!-- Dragon whiskers / tendrils -->
    <path d="M 400,-520 C 600,-500 760,-460 900,-360" class="sc" stroke-width="8" opacity="0.7"/>
    <path d="M 420,-560 C 580,-580 720,-580 880,-520" class="sc" stroke-width="6" opacity="0.5"/>
    <path d="M 380,-490 C 520,-550 640,-600 720,-700" class="sc" stroke-width="5" opacity="0.4"/>

    <!-- ══ Spines along back ══ -->
    <polygon points="80,460 -20,300 180,360" class="c" opacity="0.6"/>
    <polygon points="140,280 20,100 240,140" class="c" opacity="0.7"/>
    <polygon points="180,60 60,-120 280,-80" class="c" opacity="0.8"/>
    <polygon points="130,-160 20,-360 240,-320" class="c" opacity="0.75"/>

    <!-- ══ Wing (partial, translucent) ══ -->
    <path d="
      M -200,400
      C -400,200 -800,-100 -1100,-300
      C -1000,-200 -900,-60 -840,100
      C -780,260 -760,420 -720,540
      C -680,660 -620,740 -560,780
      C -500,820 -400,820 -300,780
      C -240,760 -200,720 -200,680
      Z
    " fill="#BF5FFF" opacity="0.3"/>
    <path d="
      M -200,400
      C -400,200 -800,-100 -1100,-300
    " class="sp" stroke-width="10" opacity="0.5"/>
    <path d="
      M -840,100 C -720,300 -600,540 -560,780
    " class="sp" stroke-width="8" opacity="0.4"/>
    <path d="
      M -900,-60 C -760,200 -680,480 -680,660
    " class="sp" stroke-width="6" opacity="0.3"/>

    <!-- Flame / breath -->
    <path d="
      M 560,-280
      C 680,-200 840,-80 1000,40
      C 1120,120 1200,200 1180,300
      C 1160,380 1080,400 1000,360
      C 920,320 880,220 840,140
      C 800,60 780,-20 720,-80
    " fill="#FF3346" opacity="0.6"/>
    <path d="
      M 580,-260
      C 700,-160 880,-20 1040,120
      C 1100,180 1120,250 1080,320
    " fill="#00F5FF" opacity="0.4"/>
    <path d="
      M 600,-300
      C 740,-200 920,-60 1060,80
    " class="sw" stroke-width="8" opacity="0.8"/>

    <!-- ══ Brand text ══ -->
    <text x="0" y="2100" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-weight="900" font-size="220"
          fill="#FFFFFF" letter-spacing="15" opacity="0.95">DRAGON</text>
    <text x="0" y="2320" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-weight="900" font-size="220"
          fill="#FF3346" letter-spacing="15" opacity="0.95">SPIRIT</text>
    <line x1="-700" y1="2360" x2="700" y2="2360" class="sc" stroke-width="6"/>
    <text x="0" y="2450" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-size="80"
          fill="#BF5FFF" letter-spacing="25" opacity="0.7">ONI THEORY   龍の魂</text>

    <!-- ══ Corner marks ══ -->
    <path d="M -1300,-2400 L -1100,-2400 L -1100,-2260" class="sc" stroke-width="10" opacity="0.35"/>
    <path d="M 1300,-2400 L 1100,-2400 L 1100,-2260" class="sc" stroke-width="10" opacity="0.35"/>
    <path d="M -1300,2500 L -1100,2500 L -1100,2360" class="sr" stroke-width="10" opacity="0.35"/>
    <path d="M 1300,2500 L 1100,2500 L 1100,2360" class="sr" stroke-width="10" opacity="0.35"/>

  </g>
</svg>
