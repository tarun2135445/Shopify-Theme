<?xml version="1.0" encoding="UTF-8"?>
<!-- GAMING GODS — Print-ready SVG
     Artboard: 4500 × 4500 px
     Usage: Chest print, 12×12 inch placement
     Concept: Controller overlaid with torii gate, controller buttons replaced with kanji symbols
     Colors: #FF3346 Red, #00F5FF Cyan, #BF5FFF Purple, White, Black -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 4500 4500" width="4500" height="4500">
  <defs>
    <style>
      .r  { fill: #FF3346; }
      .c  { fill: #00F5FF; }
      .p  { fill: #BF5FFF; }
      .w  { fill: #FFFFFF; }
      .k  { fill: #0D0D0D; }
      .sr { stroke: #FF3346; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sc { stroke: #00F5FF; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sp { stroke: #BF5FFF; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sw { stroke: #FFFFFF; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <g transform="translate(2250,2250)">

    <!-- ══ TORII GATE (background) ══ -->
    <!-- Upper kasagi (top cross beam) -->
    <rect x="-1000" y="-1100" width="2000" height="80" rx="10" class="r" opacity="0.8"/>
    <!-- Upper nuki (second beam) -->
    <rect x="-860" y="-980" width="1720" height="60" rx="8" fill="#CC2030" opacity="0.8"/>
    <!-- Left pillar -->
    <rect x="-780" y="-980" width="80" height="1400" rx="10" fill="#CC2030" opacity="0.7"/>
    <!-- Right pillar -->
    <rect x="700" y="-980" width="80" height="1400" rx="10" fill="#CC2030" opacity="0.7"/>
    <!-- Left base platform -->
    <rect x="-840" y="380" width="200" height="60" rx="6" class="r" opacity="0.6"/>
    <!-- Right base platform -->
    <rect x="640" y="380" width="200" height="60" rx="6" class="r" opacity="0.6"/>
    <!-- Torii kasagi curve detail -->
    <path d="M -1040,-1100 C -1040,-1180 -520,-1220 0,-1220 C 520,-1220 1040,-1180 1040,-1100"
          class="sr" stroke-width="12" opacity="0.5"/>

    <!-- Torii glow lines -->
    <line x1="-960" y1="-1060" x2="960" y2="-1060" class="sc" stroke-width="4" opacity="0.3"/>

    <!-- ══ GAME CONTROLLER body ══ -->
    <!-- Main body -->
    <path d="
      M -800,-400
      C -900,-400 -1000,-320 -1020,-200
      C -1040,-80 -1020,80 -980,200
      C -940,320 -860,420 -740,460
      C -620,500 -480,480 -360,420
      C -280,380 -220,320 -160,260
      L 160,260
      C 220,320 280,380 360,420
      C 480,480 620,500 740,460
      C 860,420 940,320 980,200
      C 1020,80 1040,-80 1020,-200
      C 1000,-320 900,-400 800,-400
      Z
    " fill="#1A1A2E"/>
    <!-- Controller rim -->
    <path d="
      M -800,-400
      C -900,-400 -1000,-320 -1020,-200
      C -1040,-80 -1020,80 -980,200
      C -940,320 -860,420 -740,460
      C -620,500 -480,480 -360,420
      C -280,380 -220,320 -160,260
      L 160,260
      C 220,320 280,380 360,420
      C 480,480 620,500 740,460
      C 860,420 940,320 980,200
      C 1020,80 1040,-80 1020,-200
      C 1000,-320 900,-400 800,-400 Z
    " class="sw" stroke-width="14" opacity="0.4"/>

    <!-- Controller top handles -->
    <path d="M -800,-400 C -820,-500 -820,-600 -740,-660 C -660,-720 -560,-720 -480,-680 L -440,-600 C -500,-640 -580,-640 -640,-600 C -700,-560 -700,-500 -680,-440 Z"
          fill="#161628"/>
    <path d="M 800,-400 C 820,-500 820,-600 740,-660 C 660,-720 560,-720 480,-680 L 440,-600 C 500,-640 580,-640 640,-600 C 700,-560 700,-500 680,-440 Z"
          fill="#161628"/>

    <!-- ══ D-PAD (left side) ══ -->
    <!-- Kanji symbols as D-pad directions — 上下左右 -->
    <rect x="-760" y="-280" width="100" height="100" rx="8" fill="#FF3346" opacity="0.9"/>
    <text x="-710" y="-212" text-anchor="middle" font-family="serif" font-size="72"
          fill="#FFFFFF">上</text>
    <rect x="-760" y="-60" width="100" height="100" rx="8" fill="#FF3346" opacity="0.9"/>
    <text x="-710" y="8" text-anchor="middle" font-family="serif" font-size="72"
          fill="#FFFFFF">下</text>
    <rect x="-880" y="-170" width="100" height="100" rx="8" fill="#FF3346" opacity="0.9"/>
    <text x="-830" y="-102" text-anchor="middle" font-family="serif" font-size="72"
          fill="#FFFFFF">左</text>
    <rect x="-640" y="-170" width="100" height="100" rx="8" fill="#FF3346" opacity="0.9"/>
    <text x="-590" y="-102" text-anchor="middle" font-family="serif" font-size="72"
          fill="#FFFFFF">右</text>

    <!-- D-pad centre -->
    <rect x="-760" y="-170" width="100" height="100" rx="4" fill="#CC1020"/>

    <!-- ══ FACE BUTTONS (right side) ══ -->
    <!-- △ ○ ☓ □ replaced with oni symbols -->
    <!-- Top: 鬼 -->
    <circle cx="600" cy="-280" r="70" fill="#00F5FF" opacity="0.85"/>
    <text x="600" y="-252" text-anchor="middle" font-family="serif" font-size="72"
          fill="#0A0A0A">鬼</text>
    <!-- Right: 龍 -->
    <circle cx="720" cy="-160" r="70" fill="#BF5FFF" opacity="0.85"/>
    <text x="720" y="-132" text-anchor="middle" font-family="serif" font-size="72"
          fill="#FFFFFF">龍</text>
    <!-- Left: 侍 -->
    <circle cx="480" cy="-160" r="70" fill="#BF5FFF" opacity="0.85"/>
    <text x="480" y="-132" text-anchor="middle" font-family="serif" font-size="72"
          fill="#FFFFFF">侍</text>
    <!-- Bottom: 神 -->
    <circle cx="600" cy="-40" r="70" fill="#FF3346" opacity="0.85"/>
    <text x="600" y="-12" text-anchor="middle" font-family="serif" font-size="72"
          fill="#FFFFFF">神</text>

    <!-- ══ Thumbsticks ══ -->
    <!-- Left stick -->
    <circle cx="-400" cy="60" r="90" fill="#0D0D0D"/>
    <circle cx="-400" cy="60" r="80" class="sc" stroke-width="6"/>
    <circle cx="-400" cy="60" r="44" fill="#00F5FF" opacity="0.3"/>
    <circle cx="-400" cy="60" r="24" fill="#00F5FF" opacity="0.7"/>
    <!-- Right stick -->
    <circle cx="200" cy="120" r="90" fill="#0D0D0D"/>
    <circle cx="200" cy="120" r="80" class="sc" stroke-width="6"/>
    <circle cx="200" cy="120" r="44" fill="#00F5FF" opacity="0.3"/>
    <circle cx="200" cy="120" r="24" fill="#00F5FF" opacity="0.7"/>

    <!-- ══ Centre logo / share / options buttons ══ -->
    <circle cx="-80" cy="-100" r="32" fill="#333"/>
    <circle cx="80" cy="-100" r="32" fill="#333"/>
    <!-- Centre light bar -->
    <rect x="-100" y="-50" width="200" height="24" rx="12" fill="#FF3346" opacity="0.8"/>

    <!-- ══ Shoulder button indicators ══ -->
    <!-- L1 / R1 -->
    <path d="M -700,-440 L -600,-420 L -560,-480 L -660,-500 Z" class="sc" stroke-width="6"/>
    <text x="-630" y="-450" text-anchor="middle" font-family="monospace" font-size="50"
          fill="#00F5FF" opacity="0.8">L1</text>
    <path d="M 700,-440 L 600,-420 L 560,-480 L 660,-500 Z" class="sc" stroke-width="6"/>
    <text x="630" y="-450" text-anchor="middle" font-family="monospace" font-size="50"
          fill="#00F5FF" opacity="0.8">R1</text>

    <!-- ══ SCAN LINES overlay across controller ══ -->
    <rect x="-1050" y="-470" width="2100" height="960" rx="0" fill="none"
          opacity="0"><!-- bounding clip hint --></rect>

    <!-- ══ Brand text ══ -->
    <text x="0" y="780" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-weight="900" font-size="220"
          fill="#FFFFFF" letter-spacing="15" opacity="0.95">GAMING</text>
    <text x="0" y="1000" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-weight="900" font-size="220"
          fill="#FF3346" letter-spacing="15" opacity="0.95">GODS</text>

    <line x1="-680" y1="1040" x2="680" y2="1040" class="sc" stroke-width="6"/>
    <text x="0" y="1130" text-anchor="middle"
          font-family="'Arial Black', sans-serif" font-size="80"
          fill="#BF5FFF" letter-spacing="25" opacity="0.7">ONI THEORY   神ゲーマー</text>

    <!-- ══ Corner tech marks ══ -->
    <path d="M -1200,-1280 L -1020,-1280 L -1020,-1160" class="sc" stroke-width="10" opacity="0.35"/>
    <path d="M 1200,-1280 L 1020,-1280 L 1020,-1160" class="sc" stroke-width="10" opacity="0.35"/>
    <path d="M -1200,1200 L -1020,1200 L -1020,1080" class="sr" stroke-width="10" opacity="0.35"/>
    <path d="M 1200,1200 L 1020,1200 L 1020,1080" class="sr" stroke-width="10" opacity="0.35"/>

  </g>
</svg>
