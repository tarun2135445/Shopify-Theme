<?xml version="1.0" encoding="UTF-8"?>
<!-- NEKO GLITCH — Print-ready SVG | Artboard 4500×5400 | DTG chest print
     Pixel cyber cat with glitch slices. Cyan/pink/red on dark garments. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4500 5400" width="4500" height="5400">
  <defs><style>
    .r{fill:#FF3346}.w{fill:#FFFFFF}.c{fill:#00F5FF}.p{fill:#BF5FFF}.k{fill:#0D0D0D}
    .sc{stroke:#00F5FF;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .sw{stroke:#FFFFFF;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .sp{stroke:#BF5FFF;fill:none;stroke-linecap:round;stroke-linejoin:round}
  </style></defs>
  <g transform="translate(2250,2350)">
    <!-- ══ Cat head — blocky pixel construction (white outline) ══ -->
    <!-- Ears -->
    <path d="M -820,-1240 L -820,-1700 L -360,-1240 Z" class="w"/>
    <path d="M 820,-1240 L 820,-1700 L 360,-1240 Z" class="w"/>
    <path d="M -740,-1340 L -740,-1560 L -520,-1340 Z" class="p"/>
    <path d="M 740,-1340 L 740,-1560 L 520,-1340 Z" class="p"/>
    <!-- Head block -->
    <rect x="-820" y="-1240" width="1640" height="1280" rx="60" class="w"/>
    <rect x="-740" y="-1160" width="1480" height="1120" rx="40" class="k"/>

    <!-- Glitch slice offsets across the face -->
    <rect x="-900" y="-760" width="700" height="90" class="c" opacity="0.85"/>
    <rect x="240" y="-540" width="700" height="70" class="r" opacity="0.85"/>
    <rect x="-960" y="-220" width="540" height="60" class="p" opacity="0.8"/>

    <!-- Eyes — glowing cyan rectangles -->
    <rect x="-520" y="-820" width="300" height="200" class="c"/>
    <rect x="220" y="-820" width="300" height="200" class="c"/>
    <rect x="-440" y="-770" width="120" height="100" class="k"/>
    <rect x="300" y="-770" width="120" height="100" class="k"/>

    <!-- Nose + pixel mouth -->
    <rect x="-70" y="-460" width="140" height="100" class="r"/>
    <path d="M -240,-300 L -240,-220 L -120,-220 L -120,-300 M -120,-220 L 0,-220 L 0,-300 M 0,-220 L 120,-220 L 120,-300 M 120,-220 L 240,-220 L 240,-300"
      class="sw" stroke-width="26"/>
    <!-- Fangs -->
    <rect x="-180" y="-220" width="80" height="120" class="w"/>
    <rect x="100" y="-220" width="80" height="120" class="w"/>

    <!-- Whiskers — neon lines -->
    <path d="M -820,-560 L -1240,-620" class="sc" stroke-width="22"/>
    <path d="M -820,-440 L -1260,-440" class="sc" stroke-width="22"/>
    <path d="M -820,-320 L -1240,-260" class="sc" stroke-width="22"/>
    <path d="M 820,-560 L 1240,-620" class="sc" stroke-width="22"/>
    <path d="M 820,-440 L 1260,-440" class="sc" stroke-width="22"/>
    <path d="M 820,-320 L 1240,-260" class="sc" stroke-width="22"/>

    <!-- Floating pixel debris -->
    <rect x="-1180" y="-1180" width="90" height="90" class="p" opacity="0.8"/>
    <rect x="1100" y="-1080" width="70" height="70" class="c" opacity="0.8"/>
    <rect x="-1060" y="240" width="60" height="60" class="r" opacity="0.7"/>
    <rect x="1060" y="320" width="80" height="80" class="p" opacity="0.7"/>

    <!-- 猫 kanji hit -->
    <text x="1150" y="-1330" text-anchor="middle" font-family="'Noto Serif CJK JP',serif"
      font-weight="900" font-size="360" fill="#FF3346" transform="rotate(8,1150,-1330)">猫</text>

    <!-- ERROR tag -->
    <text x="0" y="420" text-anchor="middle" font-family="'Courier New',monospace"
      font-weight="700" font-size="110" fill="#00F5FF" letter-spacing="18" opacity="0.85">ERR_404 :: INNOCENCE_NOT_FOUND</text>

    <!-- ══ Brand block — pixel style ══ -->
    <text x="0" y="1180" text-anchor="middle" font-family="'Courier New',monospace"
      font-weight="900" font-size="330" fill="#FFFFFF" letter-spacing="20">NEKO</text>
    <text x="0" y="1500" text-anchor="middle" font-family="'Courier New',monospace"
      font-weight="900" font-size="330" fill="#BF5FFF" letter-spacing="20">GLITCH</text>
    <line x1="-700" y1="1560" x2="700" y2="1560" class="sc" stroke-width="8"/>
    <text x="0" y="1670" text-anchor="middle" font-family="'Arial Black',sans-serif"
      font-size="86" fill="#00F5FF" letter-spacing="28" opacity="0.8">ONI THEORY   サイバー猫</text>
  </g>
</svg>
