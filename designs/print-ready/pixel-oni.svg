<?xml version="1.0" encoding="UTF-8"?>
<!-- PIXEL ONI — Print-ready SVG | Artboard 4500×5400 | DTG chest print
     8-bit oni mask + retro game UI. Red/cyan on dark garments. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4500 5400" width="4500" height="5400">
  <defs><style>
    .r{fill:#FF3346}.w{fill:#FFFFFF}.c{fill:#00F5FF}.y{fill:#FFE600}.k{fill:#0D0D0D}
    .sw{stroke:#FFFFFF;fill:none;stroke-linecap:square}
    .sc{stroke:#00F5FF;fill:none;stroke-linecap:square}
  </style></defs>
  <g transform="translate(2250,2400)">
    <!-- ══ Retro UI top: score + hi-score ══ -->
    <text x="-1280" y="-1700" font-family="'Courier New',monospace" font-weight="900"
      font-size="130" fill="#FFFFFF" letter-spacing="8">SCORE 666000</text>
    <text x="380" y="-1700" font-family="'Courier New',monospace" font-weight="900"
      font-size="130" fill="#FFE600" letter-spacing="8">HI 999999</text>

    <!-- ══ Health bar ══ -->
    <rect x="-1280" y="-1580" width="1400" height="90" class="sw" stroke-width="14"/>
    <rect x="-1252" y="-1556" width="380" height="42" class="r"/>
    <text x="240" y="-1508" font-family="'Courier New',monospace" font-weight="900"
      font-size="100" fill="#FF3346">HP 28%</text>

    <!-- ══ 8-bit oni mask — built on 110px grid ══ -->
    <g>
      <!-- Horns -->
      <rect x="-660" y="-1320" width="110" height="110" class="w"/>
      <rect x="-660" y="-1210" width="110" height="110" class="w"/>
      <rect x="-550" y="-1100" width="110" height="110" class="w"/>
      <rect x="550" y="-1320" width="110" height="110" class="w"/>
      <rect x="550" y="-1210" width="110" height="110" class="w"/>
      <rect x="440" y="-1100" width="110" height="110" class="w"/>
      <!-- Head block rows (red) -->
      <rect x="-550" y="-990" width="1100" height="110" class="r"/>
      <rect x="-660" y="-880" width="1320" height="660" class="r"/>
      <rect x="-550" y="-220" width="1100" height="110" class="r"/>
      <rect x="-440" y="-110" width="880" height="110" class="r"/>
      <!-- Eyes — cyan 2×1 blocks -->
      <rect x="-440" y="-770" width="220" height="110" class="c"/>
      <rect x="220" y="-770" width="220" height="110" class="c"/>
      <rect x="-330" y="-770" width="110" height="110" class="k"/>
      <rect x="220" y="-770" width="110" height="110" class="k"/>
      <!-- Nose -->
      <rect x="-55" y="-550" width="110" height="110" class="k"/>
      <!-- Mouth — jagged black row -->
      <rect x="-440" y="-330" width="880" height="110" class="k"/>
      <!-- Fangs -->
      <rect x="-330" y="-220" width="110" height="110" class="w"/>
      <rect x="220" y="-220" width="110" height="110" class="w"/>
    </g>

    <!-- ══ Pixel speech bubble ══ -->
    <g transform="translate(1010,-820)">
      <rect x="-60" y="-220" width="640" height="300" class="sw" stroke-width="14"/>
      <rect x="-60" y="80" width="110" height="110" class="sw" stroke-width="14"/>
      <text x="260" y="-20" text-anchor="middle" font-family="'Courier New',monospace"
        font-weight="900" font-size="120" fill="#FFFFFF">鬼 LV.99</text>
    </g>

    <!-- ══ PRESS START ══ -->
    <text x="0" y="420" text-anchor="middle" font-family="'Courier New',monospace"
      font-weight="900" font-size="150" fill="#00F5FF" letter-spacing="20">PRESS START</text>
    <text x="0" y="600" text-anchor="middle" font-family="'Courier New',monospace"
      font-weight="700" font-size="100" fill="#FFFFFF" letter-spacing="14" opacity="0.7">INSERT COIN TO CONTINUE</text>

    <!-- Pixel arrows / selector -->
    <rect x="-1000" y="320" width="80" height="80" class="y"/>
    <rect x="-920" y="360" width="40" height="40" class="y" opacity="0"/>
    <rect x="920" y="320" width="80" height="80" class="y"/>

    <!-- ══ Brand block — arcade ══ -->
    <text x="0" y="1280" text-anchor="middle" font-family="'Courier New',monospace"
      font-weight="900" font-size="340" fill="#FF3346" letter-spacing="22">PIXEL ONI</text>
    <line x1="-980" y1="1350" x2="980" y2="1350" class="sc" stroke-width="10"/>
    <text x="0" y="1470" text-anchor="middle" font-family="'Courier New',monospace"
      font-size="92" fill="#FFFFFF" letter-spacing="20" opacity="0.8">ONI THEORY * 8-BIT DEMON * 1986</text>
  </g>
</svg>
