<?xml version="1.0" encoding="UTF-8"?>
<!-- SHOGUN — Print-ready SVG | Artboard 4500×5400 | DTG chest print
     Iron crest: kabuto silhouette + crossed katana. Gold/red on dark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 4500 5400" width="4500" height="5400">
  <defs><style>
    .r{fill:#FF3346}.w{fill:#FFFFFF}.g{fill:#FFE600}.k{fill:#0D0D0D}
    .sr{stroke:#FF3346;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .sw{stroke:#FFFFFF;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .sg{stroke:#FFE600;fill:none;stroke-linecap:round;stroke-linejoin:round}
  </style></defs>
  <g transform="translate(2250,2400)">
    <!-- ══ Crest ring — double circle ══ -->
    <circle cx="0" cy="-300" r="1380" class="sg" stroke-width="40"/>
    <circle cx="0" cy="-300" r="1280" class="sg" stroke-width="10" opacity="0.6"/>

    <!-- ══ Crossed katana behind helmet ══ -->
    <!-- Blade 1 -->
    <path d="M -1180,-1340 L 960,640 L 1040,560 L -1100,-1420 Z" class="w" opacity="0.95"/>
    <path d="M -1140,-1360 L 1000,600" class="sg" stroke-width="10" opacity="0.6"/>
    <ellipse cx="-1110" cy="-1290" rx="80" ry="50" transform="rotate(43,-1110,-1290)" class="r"/>
    <!-- Blade 2 -->
    <path d="M 1180,-1340 L -960,640 L -1040,560 L 1100,-1420 Z" class="w" opacity="0.95"/>
    <path d="M 1140,-1360 L -1000,600" class="sg" stroke-width="10" opacity="0.6"/>
    <ellipse cx="1110" cy="-1290" rx="80" ry="50" transform="rotate(-43,1110,-1290)" class="r"/>

    <!-- ══ Kabuto helmet silhouette ══ -->
    <path d="M 0,-1000
      C 300,-1000 540,-840 600,-560
      C 640,-360 600,-180 520,-40
      L -520,-40
      C -600,-180 -640,-360 -600,-560
      C -540,-840 -300,-1000 0,-1000 Z" class="k"/>
    <path d="M 0,-1000
      C 300,-1000 540,-840 600,-560
      C 640,-360 600,-180 520,-40
      L -520,-40
      C -600,-180 -640,-360 -600,-560
      C -540,-840 -300,-1000 0,-1000 Z" class="sg" stroke-width="20"/>
    <!-- Maedate crest — gold horns -->
    <path d="M -90,-960 L -260,-1420 C -290,-1510 -180,-1560 -110,-1480 L -10,-1040 Z" class="g"/>
    <path d="M 90,-960 L 260,-1420 C 290,-1510 180,-1560 110,-1480 L 10,-1040 Z" class="g"/>
    <circle cx="0" cy="-880" r="105" class="r"/>
    <circle cx="0" cy="-880" r="105" class="sg" stroke-width="12"/>
    <!-- Visor slit -->
    <rect x="-440" y="-420" width="880" height="90" rx="12" class="r" opacity="0.9"/>
    <rect x="-360" y="-396" width="720" height="42" rx="8" class="k"/>
    <!-- Neck guard plates -->
    <path d="M -520,-40 L -600,160 L 600,160 L 520,-40 Z" class="k"/>
    <path d="M -520,-40 L -600,160 L 600,160 L 520,-40 Z" class="sg" stroke-width="14" opacity="0.8"/>
    <line x1="-560" y1="60" x2="560" y2="60" class="sg" stroke-width="8" opacity="0.5"/>

    <!-- ══ 将軍 kanji vertical ══ -->
    <text x="-1130" y="-680" text-anchor="middle" font-family="'Noto Serif CJK JP',serif"
      font-weight="900" font-size="380" fill="#FFE600">将</text>
    <text x="-1130" y="-260" text-anchor="middle" font-family="'Noto Serif CJK JP',serif"
      font-weight="900" font-size="380" fill="#FFE600">軍</text>

    <!-- Rising sun rays bottom of ring -->
    <path d="M -340,540 L -420,820 M -170,580 L -210,860 M 0,600 L 0,880 M 170,580 L 210,860 M 340,540 L 420,820"
      class="sr" stroke-width="30" opacity="0.7"/>

    <!-- ══ Brand block ══ -->
    <text x="0" y="1430" text-anchor="middle" font-family="'Arial Black',sans-serif"
      font-weight="900" font-size="300" fill="#FFE600" letter-spacing="34">SHOGUN</text>
    <line x1="-760" y1="1490" x2="760" y2="1490" class="sr" stroke-width="8"/>
    <text x="0" y="1600" text-anchor="middle" font-family="'Arial Black',sans-serif"
      font-size="86" fill="#FFFFFF" letter-spacing="28" opacity="0.8">ONI THEORY   鉄の紋章</text>
  </g>
</svg>
