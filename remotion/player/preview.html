<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --bg: #0b0b10;
        --ink: #f2efe9;
        --sub: #b9b4ab;
        --red: #ff3346;
        --display: 'Anton', 'Oswald', 'Arial Narrow', 'DejaVu Sans', Impact, sans-serif;
        --mono: 'Anonymous Pro', 'DejaVu Sans Mono', ui-monospace, monospace;
      }
      html, body { margin: 0; background: var(--bg); }
      .hero {
        position: relative; width: 1280px; height: 720px; overflow: hidden;
        display: grid; place-items: center; text-align: center; isolation: isolate;
      }
      oni-motion { position: absolute; inset: 0; z-index: 0; display: block; background: var(--bg); }
      .scrim {
        position: absolute; inset: 0; z-index: 2; pointer-events: none;
        background: linear-gradient(to top, rgba(11,11,16,0.85) 0%, rgba(11,11,16,0.15) 45%, rgba(11,11,16,0.55) 100%);
      }
      .content { position: relative; z-index: 4; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 0 24px; }
      .kicker { margin: 0; font-family: var(--mono); font-size: 15px; letter-spacing: 0.45em; text-transform: uppercase; color: rgba(255,51,70,0.95); }
      .title { margin: 0; font-family: var(--display); font-weight: 800; font-size: 150px; line-height: 0.95; letter-spacing: 0.01em; text-transform: uppercase; color: var(--ink); text-shadow: 0 0 40px rgba(255,51,70,0.35); }
      .sub { margin: 0; max-width: 600px; font-family: var(--mono); font-size: 16px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sub); }
      .actions { display: flex; gap: 16px; margin-top: 14px; }
      .btn { font-family: var(--mono); font-size: 15px; letter-spacing: 0.18em; text-transform: uppercase; padding: 16px 34px; font-weight: 700; }
      .btn--primary { background: var(--red); color: var(--bg); }
      .btn--secondary { background: transparent; color: var(--ink); border: 1px solid var(--ink); }
    </style>
  </head>
  <body>
    <div class="hero">
      <oni-motion data-kanji="鬼"></oni-motion>
      <div class="scrim"></div>
      <div class="content">
        <p class="kicker">新着 — Tokyo Midnight Division</p>
        <h1 class="title">Oni Theory</h1>
        <p class="sub">Anime streetwear forged after dark. Heavyweight hoodies &amp; graphic tees, summoned in limited runs.</p>
        <div class="actions">
          <span class="btn btn--primary">Shop hoodies</span>
          <span class="btn btn--secondary">Shop tees</span>
        </div>
      </div>
    </div>
    <script src="../../assets/oni-motion.js"></script>
  </body>
</html>
